<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>lnstagram · Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #121212;
      --border:   #2a2a2a;
      --focus:    #555;
      --text:     #f5f5f5;
      --muted:    #888;
      --grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(130px);
      opacity: 0.10;
      pointer-events: none;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #bc1888, #f09433);
      top: -150px; left: -150px;
      animation: drift 12s ease-in-out infinite alternate;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #dc2743, #bc1888);
      bottom: -100px; right: -100px;
      animation: drift 14s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0,0); }
      to   { transform: translate(40px, 30px); }
    }

    .wrapper {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 1;
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:none; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Logo */
    .logo-icon { margin-bottom: 10px; }
    .logo-icon svg { filter: drop-shadow(0 0 10px rgba(188,24,136,.4)); }
    .logo-text {
      font-family: 'Grand Hotel', cursive;
      font-size: 36px;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 4px;
    }
    .tagline {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* Form */
    .form { width: 100%; display: flex; flex-direction: column; gap: 10px; }

    .field { position: relative; }
    .field input {
      width: 100%;
      background: #0f0f0f;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 14px 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      height: 52px;
    }
    .field input:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(188,24,136,.1);
    }
    .field label {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--muted);
      pointer-events: none;
      transition: all .18s ease;
    }
    .field input:focus ~ label,
    .field input:not(:placeholder-shown) ~ label {
      top: 10px;
      font-size: 10px;
      letter-spacing: .05em;
      text-transform: uppercase;
      transform: none;
    }

    .submit-btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: var(--grad);
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity .2s, transform .15s;
      position: relative;
    }
    .submit-btn:disabled { background: #1e1e1e; color: var(--muted); cursor: not-allowed; }
    .submit-btn:not(:disabled):hover { opacity: .85; transform: translateY(-1px); }
    .submit-btn:not(:disabled):active { transform: translateY(0); }
    .submit-btn .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .submit-btn.loading .btn-text { display: none; }
    .submit-btn.loading .spinner  { display: block; }

    /* Status message */
    .msg {
      display: none;
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      margin-top: 4px;
      animation: fadeIn .3s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
    .msg.success { display:block; background:#0d2a1a; border:1px solid #1a5a30; color:#4ade80; }
    .msg.error   { display:block; background:#2a0d12; border:1px solid #5a1a24; color:#f87171; }

    /* Bottom card */
    .bottom-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }
    .bottom-card a {
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      text-decoration: none;
    }

    footer {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      opacity: .5;
      z-index: 1;
    }

    /* DB status indicator */
    .db-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .db-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #555;
      transition: background .4s;
    }
    .db-dot.connected { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
    .db-dot.error     { background: #f87171; }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="card">

    <!-- Logo -->
    <div class="logo-icon">
      <svg width="46" height="46" viewBox="0 0 24 24" fill="none">
        <defs>
          <linearGradient id="g" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#f09433"/>
            <stop offset="50%"  stop-color="#dc2743"/>
            <stop offset="100%" stop-color="#bc1888"/>
          </linearGradient>
        </defs>
        <rect x="2" y="2" width="20" height="20" rx="6" stroke="url(#g)" stroke-width="1.8" fill="none"/>
        <circle cx="12" cy="12" r="4.8" stroke="url(#g)" stroke-width="1.8" fill="none"/>
        <circle cx="17.5" cy="6.5" r="1.2" fill="url(#g)"/>
      </svg>
    </div>

    <div class="logo-text">lnstagram</div>
    <div class="tagline">Send us your contact details</div>

    <!-- DB live indicator -->
    <div class="db-status">
      <div class="db-dot" id="dbDot"></div>
      <span id="dbStatusText">Connecting to database…</span>
    </div>

    <div class="form">
      <div class="field">
        <input type="text" id="nameInput" placeholder=" " autocomplete="name"/>
        <label for="nameInput">Full Name</label>
      </div>

      <div class="field">
        <input type="email" id="emailInput" placeholder=" " autocomplete="email"/>
        <label for="emailInput">Email Address</label>
      </div>

      <div class="field">
        <input type="text" id="phoneInput" placeholder=" " autocomplete="tel"/>
        <label for="phoneInput">Phone Number (optional)</label>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
        <span class="btn-text">Submit</span>
        <div class="spinner"></div>
      </button>

      <div class="msg" id="msgBox"></div>
    </div>
  </div>

  <div class="bottom-card">
    Already have an account? <a href="#">Log in</a>
  </div>

  <footer>© 2025 lnstagram · All rights reserved</footer>
</div>

<!-- Firebase SDK -->
<script type="module">

  // ================================================================
  //  🔥 PASTE YOUR FIREBASE CONFIG HERE
  // ================================================================
  const firebaseConfig = {
    apiKey: "AIzaSyD-BG5jnFXEmRSzT8-bdLZs2L83Xo3WCFI",
  authDomain: "go-heal-896c7.firebaseapp.com",
  databaseURL: "https://go-heal-896c7-default-rtdb.firebaseio.com",
  projectId: "go-heal-896c7",
  storageBucket: "go-heal-896c7.firebasestorage.app",
  messagingSenderId: "396181307278",
  appId: "1:396181307278:web:91697f31a7e21d8505eedf",
  measurementId: "G-VGW8B9FLNG",
    databaseURL: "https://go-heal-896c7-default-rtdb.firebaseio.com/"  // 🔑 Realtime DB URL
    
  };
  // ================================================================

  let db = null;
  let _ref, _push, _serverTimestamp;

  const dot      = document.getElementById('dbDot');
  const dotText  = document.getElementById('dbStatusText');

  // ── Init Firebase Realtime Database ──
  (async () => {
    if (firebaseConfig.apiKey === "YOUR_API_KEY") {
      dot.classList.add('error');
      dotText.textContent = "Firebase not configured";
      return;
    }
    try {
      const { initializeApp, getApps, getApp } =
        await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
      const fbDb =
        await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");

      _ref             = fbDb.ref;
      _push            = fbDb.push;
      _serverTimestamp = fbDb.serverTimestamp;

      const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
      db = fbDb.getDatabase(app, firebaseConfig.databaseURL);

      dot.classList.add('connected');
      dotText.textContent = "Database connected";
      console.log("✅ Realtime Database ready →", firebaseConfig.databaseURL);
    } catch(e) {
      dot.classList.add('error');
      dotText.textContent = "Database connection failed";
      console.error("❌ DB init error:", e);
    }
  })();

  // ── Submit handler ──
  window.handleSubmit = async function () {
    const name  = document.getElementById('nameInput').value.trim();
    const email = document.getElementById('emailInput').value.trim();
    const phone = document.getElementById('phoneInput').value.trim();
    const btn   = document.getElementById('submitBtn');
    const msg   = document.getElementById('msgBox');

    msg.className = 'msg';

    if (!name || !email) {
      msg.className   = 'msg error';
      msg.textContent = '⚠️ Name and email are required.';
      return;
    }

    if (!db) {
      msg.className   = 'msg error';
      msg.textContent = '⚠️ Database not connected. Check Firebase config.';
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      // ── Save contact to Firebase Realtime Database ──
      const contactsRef = _ref(db, 'contacts');
      await _push(contactsRef, {
        name:      name,
        email:     email,
        phone:     phone || null,
        timestamp: _serverTimestamp()
      });

      console.log("📝 Contact saved to /contacts in Realtime Database");
      msg.className   = 'msg success';
      msg.textContent = '✅ Submitted successfully! We\'ll be in touch.';

      // Clear form
      document.getElementById('nameInput').value  = '';
      document.getElementById('emailInput').value = '';
      document.getElementById('phoneInput').value = '';

    } catch(e) {
      msg.className   = 'msg error';
      msg.textContent = '❌ Failed to save: ' + e.message;
      console.error(e);
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  };

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.handleSubmit();
  });

</script>
</body>
</html>
